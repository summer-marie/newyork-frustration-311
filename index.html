<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYC 311 Frustration Analysis</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div class="container mx-auto px-4 py-8">
    <h1 class="text-4xl font-bold text-center mb-8">NYC 311 Frustration Analysis</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
      <div class="bg-white p-6 rounded-lg shadow">
        <h2 class="text-2xl font-semibold mb-4">Noise Complaints by Borough</h2>
        <canvas id="noise-borough-chart"></canvas>
      </div>
      
      <div class="bg-white p-6 rounded-lg shadow">
        <h2 class="text-2xl font-semibold mb-4">Rodent Complaints by Borough</h2>
        <canvas id="rodent-borough-chart"></canvas>
      </div>
    </div>
    
    <div class="bg-white p-6 rounded-lg shadow mb-8">
      <h2 class="text-2xl font-semibold mb-4">Noise Complaints by Hour</h2>
      <canvas id="noise-hour-chart"></canvas>
    </div>
    
    <div class="bg-white p-6 rounded-lg shadow">
      <h2 class="text-2xl font-semibold mb-4">ZIP Code Overlap Analysis</h2>
      <div id="zip-overlap-table"></div>
    </div>
  </div>
  
  <script type="module" src="/src/main.js"></script>
</body>
</html>
